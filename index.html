<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NEON SURVIVOR: ONLINE</title>
    <style>
        body { margin: 0; background: #020205; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border: 1px solid #333; cursor: crosshair; box-shadow: 0 0 20px rgba(79, 172, 254, 0.2); }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .bar { width: 200px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 5px 0; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #ff416c; transition: 0.2s; }
        #leaderboard { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #4facfe; border-radius: 10px; font-size: 14px; min-width: 180px; box-shadow: 0 0 15px rgba(79, 172, 254, 0.3); }
        #leader-list div { margin: 5px 0; padding-bottom: 3px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        #level-up { position: absolute; display: none; flex-direction: column; background: rgba(5, 5, 15, 0.95); padding: 30px; border: 2px solid #4facfe; z-index: 100; text-align: center; border-radius: 15px; }
        .card { background: #111; border: 1px solid #333; padding: 15px; margin: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .card:hover { background: #4facfe; color: #000; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="ui">
    <div id="info" style="font-size: 20px; color: #4facfe; font-weight: bold;">LVL: 1 | SCORE: 0</div>
    <div class="bar"><div id="hp-fill"></div></div>
</div>

<div id="leaderboard">
    <div style="color: #4facfe; font-weight: bold; margin-bottom: 10px; text-align: center; border-bottom: 1px dashed #4facfe;">TOP PILOTS</div>
    <div id="leader-list">Загрузка...</div>
</div>

<div id="level-up">
    <h1 style="color: #4facfe;">UPGRADE UNLOCKED</h1>
    <div id="options"></div>
</div>

<canvas id="game"></canvas>

<script type="module">
    // --- ПОДКЛЮЧЕНИЕ FIREBASE ---
    import { initializeApp } from "https://gstatic.com";
    import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyBLiyFkfMagkqkXwtaGLqieNPgVMcSK-OM",
        authDomain: "://firebaseapp.com",
        projectId: "start-1217d",
        storageBucket: "start-1217d.firebasestorage.app",
        messagingSenderId: "865587817498",
        appId: "1:865587817498:web:7cbb884613ee0e767835a3",
        measurementId: "G-869PD0GJNK",
        databaseURL: "https://firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- ЛОГИКА ТАБЛИЦЫ РЕКОРДОВ ---
    function saveScore(name, score) {
        push(ref(db, 'leaderboard'), {
            name: name,
            score: score,
            date: Date.now()
        });
    }

    // Слушаем изменения в базе и обновляем таблицу на экране
    onValue(query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(10)), (snap) => {
        const list = document.getElementById('leader-list');
        list.innerHTML = '';
        const val = snap.val();
        if (val) {
            const sorted = Object.values(val).sort((a,b) => b.score - a.score);
            sorted.forEach(entry => {
                list.innerHTML += `<div><span>${entry.name}</span><strong>${entry.score}</strong></div>`;
            });
        } else {
            list.innerHTML = 'Будь первым!';
        }
    });

    // --- КОД ИГРЫ ---
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 600;

    let game = { active: true, paused: false, score: 0, lvl: 1, exp: 0, nextExp: 50 };
    const player = { x: 400, y: 500, w: 30, h: 30, hp: 100, speed: 6, dmg: 1, rate: 20, cd: 0 };
    let objs = { b: [], e: [], l: [] };
    const keys = {};

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function spawn() {
        if(game.paused || !game.active) return;
        if(Math.random() < 0.02 + (game.lvl * 0.005)) {
            objs.e.push({ 
                x: Math.random()*770, 
                y: -30, 
                hp: 1 + Math.floor(game.lvl/2), 
                size: 30, 
                speed: 1.5 + Math.random() + (game.lvl * 0.1) 
            });
        }
    }

    function update() {
        if(!game.active || game.paused) return;

        if((keys.ArrowLeft || keys.KeyA) && player.x > 0) player.x -= player.speed;
        if((keys.ArrowRight || keys.KeyD) && player.x < 770) player.x += player.speed;
        if((keys.ArrowUp || keys.KeyW) && player.y > 0) player.y -= player.speed;
        if((keys.ArrowDown || keys.KeyS) && player.y < 570) player.y += player.speed;

        if(player.cd > 0) player.cd--;
        if(keys.Space && player.cd <= 0) {
            objs.b.push({ x: player.x+15, y: player.y, vy: -12 });
            player.cd = player.rate;
        }

        objs.b.forEach((b, i) => {
            b.y += b.vy;
            if(b.y < 0) objs.b.splice(i, 1);
        });

        objs.e.forEach((en, i) => {
            en.y += en.speed;
            if(en.y > 600) objs.e.splice(i, 1);
            
            // Столкновение с игроком
            if(en.x < player.x+30 && en.x+30 > player.x && en.y < player.y+30 && en.y+30 > player.y) {
                player.hp -= 20;
                objs.e.splice(i, 1);
                if(player.hp <= 0) endGame();
            }

            // Попадание пуль
            objs.b.forEach((b, bi) => {
                if(b.x > en.x && b.x < en.x+30 && b.y > en.y && b.y < en.y+30) {
                    en.hp -= player.dmg;
                    objs.b.splice(bi, 1);
                    if(en.hp <= 0) {
                        objs.l.push({x: en.x + 10, y: en.y + 10});
                        objs.e.splice(i, 1);
                        game.score += 10;
                    }
                }
            });
        });

        // Сбор опыта
        objs.l.forEach((l, i) => {
            l.y += 1;
            if(Math.hypot(player.x+15-l.x, player.y+15-l.y) < 40) {
                game.exp += 20;
                objs.l.splice(i, 1);
                if(game.exp >= game.nextExp) startLevelUp();
            }
        });

        document.getElementById('hp-fill').style.width = player.hp + '%';
        document.getElementById('info').innerText = `LVL: ${game.lvl} | SCORE: ${game.score}`;
    }

    function startLevelUp() {
        game.paused = true;
        game.lvl++;
        game.exp = 0;
        game.nextExp += 50;
        document.getElementById('level-up').style.display = 'flex';
        document.getElementById('options').innerHTML = `
            <div class="card" onclick="window.applyUpgrade(1)">+ DAMAGE (Current: ${player.dmg})</div>
            <div class="card" onclick="window.applyUpgrade(2)">+ SPEED (Current: ${player.speed})</div>
            <div class="card" onclick="window.applyUpgrade(3)">+ FIRE RATE</div>
        `;
    }

    window.applyUpgrade = (type) => {
        if(type === 1) player.dmg += 1;
        if(type === 2) player.speed += 1;
        if(type === 3) player.rate = Math.max(5, player.rate - 3);
        game.paused = false;
        document.getElementById('level-up').style.display = 'none';
    };

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 800, 600);

        // Игрок
        ctx.fillStyle = '#4facfe';
        ctx.shadowBlur = 10; ctx.shadowColor = '#4facfe';
        ctx.fillRect(player.x, player.y, 30, 30);

        // Пули
        ctx.fillStyle = '#fff';
        objs.b.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 12));

        // Враги
        ctx.fillStyle = '#ff416c'; ctx.shadowColor = '#ff416c';
        objs.e.forEach(en => ctx.fillRect(en.x, en.y, 30, 30));

        // Опыт
        ctx.fillStyle = '#2ed573'; ctx.shadowBlur = 5;
        objs.l.forEach(l => ctx.fillRect(l.x, l.y, 8, 8));
        
        ctx.shadowBlur = 0;

        if(!game.active) {
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0,0,800,600);
            ctx.fillStyle = '#4facfe';
            ctx.textAlign = 'center';
            ctx.font = 'bold 40px Arial';
            ctx.fillText('MISSION FAILED', 400, 280);
            ctx.font = '20px Arial';
            ctx.fillStyle = '#fff';
            ctx.fillText('Check the leaderboard! F5 to restart', 400, 330);
        }
        requestAnimationFrame(() => { update(); spawn(); draw(); });
    }

    function endGame() {
        if(!game.active) return;
        game.active = false;
        const name = prompt("Enter your name for the leaderboard:", "Noob_Pilot");
        if(name) {
            saveScore(name, game.score);
        }
    }

    draw();
</script>
</body>
</html>
