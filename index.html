<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Space Survivor ROGUE - Fixed</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border: 2px solid #333; cursor: none; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .bar { width: 250px; height: 10px; background: #222; border: 1px solid #444; margin: 5px 0; }
        #hp-fill { width: 100%; height: 100%; background: #ff4757; transition: 0.2s; }
        #exp-fill { width: 0%; height: 100%; background: #2ed573; transition: 0.2s; }
        #level-up { position: absolute; display: none; flex-direction: column; background: rgba(0,0,0,0.95); padding: 40px; border: 2px solid #2ed573; text-align: center; }
        button { background: transparent; color: #2ed573; border: 1px solid #2ed573; padding: 15px; margin: 10px; cursor: pointer; font-size: 18px; width: 300px; }
        button:hover { background: #2ed573; color: #000; }
    </style>
</head>
<body>

<div id="ui">
    <div id="info">LVL: 1 | SCORE: 0</div>
    HP <div class="bar"><div id="hp-fill"></div></div>
    EXP <div class="bar"><div id="exp-fill"></div></div>
</div>

<div id="level-up">
    <h1>УРОВЕНЬ ПОВЫШЕН</h1>
    <div id="options"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 600;

let game = {
    active: true, paused: false, score: 0, lvl: 1, 
    exp: 0, nextLvl: 100, timer: 0, spawnRate: 60, shake: 0
};

const player = {
    x: 400, y: 500, w: 30, h: 30, hp: 100, maxHp: 100,
    speed: 5, fireRate: 20, cooldown: 0, bullets: 1, dmg: 1
};

let stars = Array(100).fill().map(() => ({x: Math.random()*800, y: Math.random()*600, s: Math.random()*2}));
let objs = { b: [], e: [], p: [], l: [] }; // bullets, enemies, particles, loot
const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function spawn() {
    game.timer++;
    // Чем выше уровень, тем чаще спавн (каждые 60 кадров на 1 лвле, каждые 20 на 10 лвле)
    let currentRate = Math.max(15, game.spawnRate - (game.lvl * 3));
    
    if(game.timer % currentRate === 0) {
        let isBoss = game.lvl % 5 === 0 && objs.e.filter(en => en.boss).length === 0;
        objs.e.push({
            x: Math.random() * 760, y: -50,
            size: isBoss ? 80 : 20 + Math.random()*30,
            hp: isBoss ? 50 + (game.lvl*10) : 1 + Math.floor(game.lvl/3),
            speed: isBoss ? 0.5 : 1 + Math.random()*2 + (game.lvl * 0.1),
            color: isBoss ? '#ff1f1f' : (Math.random() > 0.8 ? '#f1c40f' : '#ff4757'),
            boss: isBoss
        });
    }
}

function upgrade(type) {
    if(type === 0) player.fireRate = Math.max(5, player.fireRate - 3);
    if(type === 1) player.bullets++;
    if(type === 2) player.dmg++;
    if(type === 3) player.hp = Math.min(player.maxHp, player.hp + 50);
    game.paused = false;
    document.getElementById('level-up').style.display = 'none';
}

function showLevelUp() {
    game.paused = true;
    const menu = document.getElementById('level-up');
    const options = document.getElementById('options');
    menu.style.display = 'flex';
    options.innerHTML = '';
    const list = [
        {t: 'СКОРОСТРЕЛЬНОСТЬ', i: 0}, {t: 'ДОП. ПУЛЯ', i: 1}, 
        {t: 'УРОН +1', i: 2}, {t: 'ЛЕЧЕНИЕ', i: 3}
    ].sort(() => 0.5 - Math.random()).slice(0, 3);
    
    list.forEach(o => {
        let b = document.createElement('button');
        b.textContent = o.t;
        b.onclick = () => upgrade(o.i);
        options.appendChild(b);
    });
}

function loop() {
    if(!game.paused && game.active) {
        update();
        spawn();
    }
    draw();
    requestAnimationFrame(loop);
}

function update() {
    // Движение
    if((keys.ArrowLeft || keys.KeyA) && player.x > 0) player.x -= player.speed;
    if((keys.ArrowRight || keys.KeyD) && player.x < canvas.width - player.w) player.x += player.speed;
    if((keys.ArrowUp || keys.KeyW) && player.y > 0) player.y -= player.speed;
    if((keys.ArrowDown || keys.KeyS) && player.y < canvas.height - player.h) player.y += player.speed;

    // Стрельба
    if(player.cooldown > 0) player.cooldown--;
    if(keys.Space && player.cooldown <= 0) {
        for(let i=0; i<player.bullets; i++) {
            objs.b.push({x: player.x + player.w/2, y: player.y, vx: (i - (player.bullets-1)/2)*2, vy: -8});
        }
        player.cooldown = player.fireRate;
    }

    // Звезды
    stars.forEach(s => { s.y += s.s; if(s.y > 600) s.y = -5; });

    // Пули
    objs.b.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(b.y < 0) objs.b.splice(i, 1);
    });

    // Враги
    objs.e.forEach((en, i) => {
        en.y += en.speed;
        if(en.y > 600) objs.e.splice(i, 1);

        if(en.x < player.x+player.w && en.x+en.size > player.x && en.y < player.y+player.h && en.y+en.size > player.y) {
            player.hp -= en.boss ? 2 : 10;
            game.shake = 15;
            if(!en.boss) objs.e.splice(i, 1);
            if(player.hp <= 0) game.active = false;
        }

        objs.b.forEach((b, bi) => {
            if(b.x > en.x && b.x < en.x+en.size && b.y > en.y && b.y < en.y+en.size) {
                en.hp -= player.dmg;
                objs.b.splice(bi, 1);
                if(en.hp <= 0) {
                    for(let j=0; j<(en.boss?20:3); j++) objs.l.push({x: en.x+en.size/2, y: en.y+en.size/2, v: 20});
                    objs.e.splice(i, 1);
                    game.score += en.boss ? 500 : 10;
                }
            }
        });
    });

    // Опыт (магнит)
    objs.l.forEach((l, i) => {
        let dist = Math.hypot(player.x - l.x, player.y - l.y);
        if(dist < 150) {
            l.x += (player.x - l.x) * 0.1;
            l.y += (player.y - l.y) * 0.1;
        } else {
            l.y += 1;
        }
        if(dist < 20) {
            game.exp += l.v;
            objs.l.splice(i, 1);
            if(game.exp >= game.nextLvl) {
                game.lvl++;
                game.exp = 0;
                game.nextLvl += 50;
                showLevelUp();
            }
        }
    });

    document.getElementById('hp-fill').style.width = player.hp + '%';
    document.getElementById('exp-fill').style.width = (game.exp/game.nextLvl)*100 + '%';
    document.getElementById('info').innerText = `LVL: ${game.lvl} | SCORE: ${game.score}`;
}

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 800, 600);
    
    ctx.save();
    if(game.shake > 0) {
        ctx.translate((Math.random()-0.5)*game.shake, (Math.random()-0.5)*game.shake);
        game.shake *= 0.9;
    }

    ctx.fillStyle = '#fff';
    stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

    ctx.fillStyle = '#00d2ff';
    ctx.shadowBlur = 10; ctx.shadowColor = '#00d2ff';
    ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.fillStyle = '#fff';
    objs.b.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 12));

    objs.e.forEach(en => {
        ctx.fillStyle = en.color;
        ctx.shadowColor = en.color;
        ctx.fillRect(en.x, en.y, en.size, en.size);
    });

    ctx.shadowBlur = 5; ctx.fillStyle = '#2ed573';
    objs.l.forEach(l => ctx.fillRect(l.x, l.y, 6, 6));
    
    ctx.restore();

    if(!game.active) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0,0,800,600);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = '40px Arial';
        ctx.fillText('GAME OVER', 400, 300);
        ctx.font = '20px Arial';
        ctx.fillText('Press F5 to Restart', 400, 340);
    }
}

loop();
</script>
</body>
</html>
